<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Project J</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808; --surface: #111111; --surface2: #1a1a1a;
    --border: #222222; --text: #e8e8e8; --muted: #555555; --muted2: #333333;
    --blue: #3b82f6; --green: #10b981; --amber: #f59e0b; --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; max-width: 480px; margin: 0 auto; padding-bottom: 80px; overflow-x: hidden; }
  .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #0e0e0e; border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
  .nav-btn { flex: 1; padding: 12px 0 10px; background: none; border: none; color: var(--muted); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; font-family: 'DM Sans', sans-serif; font-size: 10px; letter-spacing: 1px; transition: color 0.15s; }
  .nav-btn.active { color: var(--text); }
  .nav-btn svg { width: 20px; height: 20px; }
  .tab { display: none; padding: 0 16px 16px; }
  .tab.active { display: block; }
  .page-header { padding: 20px 16px 12px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .page-header .label { font-size: 10px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; }
  .page-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 2px; color: var(--text); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
  .card-label { font-size: 9px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .if-badge { font-size: 10px; letter-spacing: 2px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
  .if-badge.open { background: rgba(16,185,129,0.15); color: var(--green); }
  .if-badge.closed { background: rgba(239,68,68,0.15); color: var(--red); }
  .if-time { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 2px; color: var(--text); line-height: 1; margin: 8px 0; }
  .if-sub { font-size: 12px; color: var(--muted); }
  .if-bar { height: 3px; background: var(--border); border-radius: 3px; margin: 12px 0 14px; overflow: hidden; }
  .if-bar-fill { height: 100%; border-radius: 3px; }
  .if-start-btn { width: 100%; padding: 12px; background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); border-radius: 6px; color: var(--green); font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; cursor: pointer; }
  .if-reset-btn { background: none; border: none; color: var(--muted); font-size: 11px; cursor: pointer; margin-top: 8px; text-decoration: underline; display: block; font-family: 'DM Sans', sans-serif; }
  .cal-numbers { display: flex; align-items: baseline; gap: 6px; margin-bottom: 10px; }
  .cal-current { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 1px; line-height: 1; }
  .cal-target { font-size: 14px; color: var(--muted); }
  .cal-bar, .water-bar, .progress-bar { height: 6px; background: var(--border); border-radius: 6px; overflow: hidden; margin-bottom: 12px; }
  .progress-bar { height: 2px; margin-bottom: 16px; }
  .cal-bar-fill, .water-bar-fill, .progress-bar-fill { height: 100%; border-radius: 6px; transition: width 0.3s; }
  .water-bar-fill { background: var(--blue); }
  .btn-sm { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; }
  .btn-blue { background: rgba(59,130,246,0.15); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); }
  .btn-green { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
  .btn-red { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .water-btns { display: flex; gap: 8px; margin-bottom: 8px; }
  .water-btn { flex: 1; padding: 10px 0; background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.25); border-radius: 6px; color: var(--blue); font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 1px; cursor: pointer; }
  .water-btn-red { flex: 1; padding: 10px 0; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); border-radius: 6px; color: var(--red); font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 1px; cursor: pointer; }
  .weight-row { display: flex; gap: 12px; }
  .weight-stat { flex: 1; }
  .weight-val { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 1px; line-height: 1; }
  .weight-lbl { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
  .weight-add { display: flex; gap: 8px; margin-top: 14px; }
  .weight-add input, .add-entry input, .modal input, .modal textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; }
  .weight-add input { flex: 1; }
  .workout-pill { font-size: 10px; letter-spacing: 2px; padding: 4px 12px; border-radius: 20px; font-weight: 600; text-transform: uppercase; }
  .day-tabs { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 4px; margin-bottom: 16px; }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab { flex-shrink: 0; padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; line-height: 1.4; }
  .exercise-item { border: 1px solid var(--border); border-left: 3px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 8px; background: var(--surface); }
  .exercise-item.done { opacity: 0.5; }
  .exercise-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .exercise-meta { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .exercise-note { font-size: 11px; color: var(--muted2); font-style: italic; line-height: 1.5; }
  .dropset-badge, .custom-badge { font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: 700; letter-spacing: 1px; }
  .ex-actions { display: flex; gap: 6px; margin-top: 10px; align-items: center; }
  .ex-action-btn { padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 11px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .check-circle { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .notes-area { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 10px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; resize: none; min-height: 80px; margin-top: 12px; line-height: 1.5; }
  .notes-area::placeholder { color: var(--muted2); }
  .save-note-btn { margin-top: 8px; padding: 8px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; }
  .log-entry { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .log-entry:last-child { border-bottom: none; }
  .log-entry-del { background: none; border: none; color: var(--muted2); cursor: pointer; font-size: 18px; padding: 0 4px; }
  .meal-header { font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .add-entry { display: flex; gap: 6px; margin-top: 8px; }
  .add-entry input:first-child { flex: 2; }
  .add-entry input:nth-child(2) { flex: 1; }
  .chart-container { width: 100%; height: 160px; position: relative; margin: 8px 0; }
  .toggle-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .toggle-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .toggle-btn.active { background: var(--surface2); color: var(--text); border-color: var(--muted); }
  .complete-msg { text-align: center; padding: 16px; border: 1px solid; border-radius: 6px; margin-top: 16px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px 16px 0 0; padding: 24px; width: 100%; max-width: 480px; }
  .modal h3 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; margin-bottom: 16px; }
  .modal input { width: 100%; margin-bottom: 10px; }
  .modal-row { display: flex; gap: 8px; }
  .modal-row input { flex: 1; }
  .modal-btns { display: flex; gap: 8px; margin-top: 8px; }
  .modal-btns button { flex: 1; padding: 12px; border-radius: 6px; border: none; cursor: pointer; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-top: 8px; }
  .cal-day-header { text-align: center; font-size: 9px; letter-spacing: 1px; color: var(--muted); padding: 4px 0; }
  .cal-day { aspect-ratio: 1; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
  .cal-day.future { color: var(--muted2); background: transparent; }
  .cal-day.green { background: rgba(16,185,129,0.25); color: var(--green); }
  .cal-day.yellow { background: rgba(245,158,11,0.25); color: var(--amber); }
  .cal-day.red { background: rgba(239,68,68,0.2); color: var(--red); }
  .cal-day.none { color: var(--muted2); }
  .cal-day.today { outline: 1px solid var(--muted); outline-offset: 1px; }
  .swap-btn { font-size: 11px; padding: 5px 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .history-week { margin-bottom: 16px; }
  .history-week-header { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; color: var(--amber); margin-bottom: 8px; }
  .history-row { display: flex; justify-content: space-between; font-size: 12px; padding: 6px 0; border-bottom: 1px solid var(--border); color: var(--muted); }
  .history-row:last-child { border-bottom: none; }
  .cardio-stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .cardio-stat-row label { font-size: 12px; color: var(--muted); width: 130px; flex-shrink: 0; }
  .cardio-stat-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 6px 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; }
</style>
</head>
<body>

<div id="tab-home" class="tab active"></div>
<div id="tab-workout" class="tab"></div>
<div id="tab-log" class="tab"></div>
<div id="tab-stats" class="tab"></div>
<div id="modal-container"></div>

<nav class="nav">
  <button class="nav-btn active" onclick="switchTab('home',this)">
    <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955a1.5 1.5 0 012.092 0L22.5 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75"/></svg>HOME
  </button>
  <button class="nav-btn" onclick="switchTab('workout',this)">
    <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/></svg>WORKOUT
  </button>
  <button class="nav-btn" onclick="switchTab('log',this)">
    <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>LOG
  </button>
  <button class="nav-btn" onclick="switchTab('stats',this)">
    <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/></svg>STATS
  </button>
</nav>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const CAL_TARGET = 1750, WATER_TARGET = 96, WINDOW_HOURS = 8;
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const DEFAULT_PROGRAM = {
  Wed:{focus:'Push',muscles:'Chest · Shoulders · Triceps',color:'#3b82f6',type:'lift',exercises:[
    {name:'Machine Chest Press',sets:'4',reps:'10–12',rest:'60s',note:'Controlled lower, full press. Keep back flat.'},
    {name:'Cable Fly (Low to High)',sets:'3',reps:'12–15',rest:'45s',note:'Squeeze at the top. Lighter weight, feel the chest.'},
    {name:'Machine Shoulder Press',sets:'3',reps:'10–12',rest:'60s',note:"Don't shrug into it. Full ROM."},
    {name:'Cable Lateral Raise',sets:'3',reps:'15',rest:'30s',note:'One arm at a time. Light, slow and controlled.'},
    {name:'Tricep Pushdown (Rope)',sets:'3',reps:'12',rest:'45s',note:'Flare the rope at the bottom. Lock out each rep.'},
    {name:'Overhead Tricep Extension (Cable)',sets:'2',reps:'12 → drop → failure',rest:'60s',note:'Dropset on last set.',dropset:true},
  ]},
  Sat:{focus:'Pull',muscles:'Back · Biceps · Rear Delts',color:'#10b981',type:'lift',exercises:[
    {name:'Lat Pulldown (Wide Grip)',sets:'4',reps:'10–12',rest:'60s',note:'Pull to upper chest. Feel the lats.'},
    {name:'Seated Cable Row',sets:'3',reps:'10–12',rest:'60s',note:'Chest up, elbows back. Squeeze at the end.'},
    {name:'Machine Row',sets:'3',reps:'12',rest:'45s',note:'Good for isolating without lower back load.'},
    {name:'Cable Face Pull',sets:'3',reps:'15–20',rest:'30s',note:'Rope to forehead, elbows high. Great for posture.'},
    {name:'Hammer Curl',sets:'3',reps:'12',rest:'45s',note:'Neutral grip. Targets brachialis for arm thickness.'},
    {name:'Cable Curl',sets:'2',reps:'10 → drop → failure',rest:'60s',note:'Dropset on last set. Squeeze hard at the top.',dropset:true},
  ]},
  Sun:{focus:'Legs + Core',muscles:'Quads · Hamstrings · Glutes · Core',color:'#f59e0b',type:'lift',exercises:[
    {name:'Leg Press',sets:'4',reps:'10–12',rest:'90s',note:'Feet shoulder width, mid platform.'},
    {name:'Leg Extension (Machine)',sets:'3',reps:'12–15',rest:'45s',note:'Pause at top briefly.'},
    {name:'Hamstring Curl',sets:'3',reps:'12',rest:'45s',note:'Full ROM. Do not rush the negative.'},
    {name:'Glute Kickback (Cable)',sets:'3',reps:'15 each',rest:'30s',note:'Squeeze at the top. No spinal load.'},
    {name:'Plank',sets:'3',reps:'30–45s hold',rest:'30s',note:"Core is your back's best friend. Do not skip."},
    {name:'Dead Bug',sets:'3',reps:'10 each side',rest:'30s',note:'Slow and controlled. Best for lower back stability.'},
    {name:'Cable Crunch',sets:'3',reps:'15',rest:'30s',note:'Kneel facing cable. Crunch down, not pull.'},
  ]},
  Mon:{focus:'Cardio',type:'cardio'},Tue:{focus:'Cardio',type:'cardio'},Thu:{focus:'Cardio',type:'cardio'},Fri:{focus:'Cardio',type:'cardio'},
};

// ── STORAGE ───────────────────────────────────────────────────────────────────
const ld=(k,d)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch{return d;}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const todayKey=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};
const getToday=()=>['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()];
const blankDay=()=>({calories:[],water:0,weight:null,ifStart:null,workoutChecks:{},workoutNotes:{},cardioComplete:false,cardioLog:{},daySwaps:{},customExercises:{},removedExercises:{},exerciseOverrides:{},dailyNote:''});
const getDayData=dk=>ld('pj_day_'+dk,blankDay());
const saveDayData=(data,dk)=>sv('pj_day_'+(dk||todayKey()),data);
const getWeightHistory=()=>ld('pj_weights',[]);
const saveWeightHistory=h=>sv('pj_weights',h);
const getCalHistory=()=>ld('pj_cals',[]);
const saveCalHistory=h=>sv('pj_cals',h);
const getWeekHistory=()=>ld('pj_week_history',[]);
const saveWeekHistory=h=>sv('pj_week_history',h);

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = getDayData(todayKey());
let activeWorkoutDay = getToday();
let statsRange = 7;
let ifInterval = null;

// ── HELPERS ───────────────────────────────────────────────────────────────────
const totalCals=()=>state.calories.reduce((s,e)=>s+e.cal,0);
const formatTime=ms=>{if(ms<=0)return'00:00:00';const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;};
const greeting=()=>{const h=new Date().getHours();return h<12?'Good morning':h<17?'Good afternoon':'Good evening';};

function getDayProgram(day){
  if(state.daySwaps&&state.daySwaps[day]) return state.daySwaps[day];
  return DEFAULT_PROGRAM[day];
}
function getDayColor(day){const p=getDayProgram(day);return(!p||p.type==='cardio')?'#555':p.color||'#3b82f6';}

function getExerciseList(day){
  const p=getDayProgram(day);
  const customs=(state.customExercises&&state.customExercises[day])||[];
  const removed=(state.removedExercises&&state.removedExercises[day])||[];
  const overrides=(state.exerciseOverrides&&state.exerciseOverrides[day])||{};
  if(!p||p.type==='cardio') return customs;
  const base=(p.exercises||[]).map((ex,i)=>{
    if(removed.includes(i)) return null;
    return overrides[i]?{...ex,...overrides[i]}:ex;
  }).filter(Boolean);
  return [...base,...customs];
}

function updateCalHistory(){
  const ch=getCalHistory(),today=todayKey(),ex=ch.findIndex(c=>c.date===today),total=totalCals();
  if(ex>=0)ch[ex].cal=total;else ch.push({date:today,cal:total});
  saveCalHistory(ch);
}

function getDayStatus(dk){
  const today=todayKey();
  if(dk>today) return 'future';
  const data=getDayData(dk);
  const d=new Date(dk+'T12:00:00');
  const dayName=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
  const p=DEFAULT_PROGRAM[dayName];
  if(!p) return 'none';
  if(p.type==='cardio'){
    return data.cardioComplete?'green':'red';
  }
  if(p.type==='lift'){
    const checks=(data.workoutChecks&&data.workoutChecks[dayName])||{};
    const removed=(data.removedExercises&&data.removedExercises[dayName])||[];
    const total=(p.exercises||[]).length-removed.length+((data.customExercises&&data.customExercises[dayName])||[]).length;
    const done=Object.values(checks).filter(Boolean).length;
    if(done===0) return 'red';
    if(done>=total) return 'green';
    return 'yellow';
  }
  return 'none';
}

function snapshotWeek(){
  const lastSnap=ld('pj_last_snap','');
  const now=new Date();
  const ws=new Date(now);ws.setDate(now.getDate()-now.getDay());
  const wk=ws.toISOString().split('T')[0];
  if(lastSnap===wk) return;
  const wh=getWeekHistory(),ch=getCalHistory(),weights=getWeightHistory();
  const snap={week:wk,days:{}};
  for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(d.getDate()+i);const dk=d.toISOString().split('T')[0];const cE=ch.find(c=>c.date===dk);const wE=weights.find(w=>w.date===dk);snap.days[dk]={cal:cE?cE.cal:null,weight:wE?wE.w:null};}
  const cv=Object.values(snap.days).map(d=>d.cal).filter(Boolean);
  snap.avgCal=cv.length?Math.round(cv.reduce((a,b)=>a+b)/cv.length):0;
  const wv=Object.values(snap.days).map(d=>d.weight).filter(Boolean);
  snap.avgWeight=wv.length?(wv.reduce((a,b)=>a+b)/wv.length).toFixed(1):0;
  wh.push(snap);saveWeekHistory(wh);sv('pj_last_snap',wk);
}

// ── IF WINDOW ─────────────────────────────────────────────────────────────────
function renderIFCard(){
  if(!state.ifStart) return`<button class="if-start-btn" onclick="startIF()">TAP WHEN YOU EAT YOUR FIRST MEAL</button>`;
  const now=Date.now(),end=state.ifStart+WINDOW_HOURS*3600000,open=now<end;
  const remaining=end-now,elapsed=now-state.ifStart,pct=Math.min(100,(elapsed/(WINDOW_HOURS*3600000))*100);
  return`<div style="display:flex;align-items:center;justify-content:space-between">
    <div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--muted)">Window ${open?'closes in':'closed'}</div>
      <div class="if-time" id="if-countdown">${open?formatTime(remaining):'CLOSED'}</div>
      <div class="if-sub">Started ${new Date(state.ifStart).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} · Closes ${new Date(end).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
    </div>
    <span class="if-badge ${open?'open':'closed'}">${open?'OPEN':'CLOSED'}</span>
  </div>
  <div class="if-bar"><div class="if-bar-fill" style="width:${pct}%;background:${open?'var(--green)':'var(--red)'}"></div></div>
  <button class="if-reset-btn" onclick="resetIF()">Reset window</button>`;
}
function startIF(){state.ifStart=Date.now();saveDayData(state);document.getElementById('if-card').innerHTML='<div class="card-label">Intermittent Fast · 16:8</div>'+renderIFCard();startIFTimer();}
function resetIF(){state.ifStart=null;saveDayData(state);document.getElementById('if-card').innerHTML='<div class="card-label">Intermittent Fast · 16:8</div>'+renderIFCard();clearInterval(ifInterval);}
function startIFTimer(){
  clearInterval(ifInterval);if(!state.ifStart)return;
  ifInterval=setInterval(()=>{const el=document.getElementById('if-countdown');if(!el){clearInterval(ifInterval);return;}const r=state.ifStart+WINDOW_HOURS*3600000-Date.now();el.textContent=r<=0?'CLOSED':formatTime(r);if(r<=0)clearInterval(ifInterval);},1000);
}
function addWater(oz){state.water+=oz;saveDayData(state);renderHome();}
function removeWater(oz){state.water=Math.max(0,state.water-oz);saveDayData(state);renderHome();}
function logWeight(){
  const v=parseFloat(document.getElementById('weight-input').value);if(!v||v<=0)return;

function removeEx(day,idx){

function addEntry(meal){const name=document.getElementById('n-'+meal).value.trim()||meal;const cal=parseInt(document.getElementById('c-'+meal).value);if(!cal||cal<=0)return;state.calories.push({name,cal,meal,time:Date.now()});saveDayData(state);updateCalHistory();renderLog();}

function addWaterLog(oz){state.water+=oz;saveDayData(state);renderLog();}
function removeWaterLog(oz){state.water=Math.max(0,state.water-oz);saveDayData(state);renderLog();}

// ── STATS ─────────────────────────────────────────────────────────────────────
function renderStats(){
  const tab=document.getElementById('tab-stats');
  const now=new Date(),year=now.getFullYear(),month=now.getMonth();
  const firstDay=new Date(year,month,1).getDay(),daysInMonth=new Date(year,month+1,0).getDate();
  let calHTML=`<div class="cal-grid">${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-day-header">${d}</div>`).join('')}`;
  for(let i=0;i<firstDay;i++) calHTML+=`<div></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dk=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const status=getDayStatus(dk),isToday=dk===todayKey();
    calHTML+=`<div class="cal-day ${status} ${isToday?'today':''}">${d}</div>`;
  }
  calHTML+=`</div>`;

  const wh=getWeekHistory();
  let histHTML=wh.length===0?`<div style="font-size:13px;color:var(--muted);text-align:center;padding:16px">No history yet. Check back after your first full week.</div>`:
    [...wh].reverse().slice(0,8).map(snap=>`<div class="history-week"><div class="history-week-header">Week of ${snap.week}</div><div style="display:flex;gap:16px"><div style="flex:1;font-size:12px;color:var(--muted)">Avg Calories<br><span style="color:var(--text);font-size:16px;font-family:'Bebas Neue',sans-serif">${snap.avgCal||'--'}</span></div><div style="flex:1;font-size:12px;color:var(--muted)">Avg Weight<br><span style="color:var(--text);font-size:16px;font-family:'Bebas Neue',sans-serif">${snap.avgWeight||'--'} lbs</span></div></div></div>`).join('');

  tab.innerHTML=`<div class="page-header"><div class="label">Project J</div><h1>Stats</h1></div>
  <div class="card">
    <div class="card-label">${MONTH_NAMES[month]} ${year}</div>
    <div style="display:flex;gap:14px;margin-bottom:10px;font-size:11px">
      <span style="color:var(--green)">● Full</span><span style="color:var(--amber)">● Partial</span><span style="color:var(--red)">● Missed</span><span style="color:var(--muted2)">● Future</span>
    </div>
    ${calHTML}
  </div>
  <div class="toggle-row">
    <button class="toggle-btn ${statsRange===7?'active':''}" onclick="setRange(7)">7 Days</button>
    <button class="toggle-btn ${statsRange===30?'active':''}" onclick="setRange(30)">30 Days</button>
  </div>
  <div class="card"><div class="card-label">Weight Trend (lbs)</div><div class="chart-container"><canvas id="weight-chart"></canvas></div></div>
  <div class="card"><div class="card-label">Daily Calories vs Target</div><div class="chart-container"><canvas id="cal-chart"></canvas></div></div>
  <div class="card"><div class="card-label">Week History</div>${histHTML}</div>`;
  drawCharts();
}

function setRange(r){statsRange=r;renderStats();}

function drawCharts(){
  drawLine('weight-chart',getWeightHistory().slice(-statsRange).map(w=>({l:w.date,v:w.w})),'#10b981');
  drawBars('cal-chart',getCalHistory().slice(-statsRange).map(c=>({l:c.date,v:c.cal})),'#3b82f6',CAL_TARGET);
}

function drawLine(id,pts,color){
  const canvas=document.getElementById(id);if(!canvas||pts.length===0)return;
  const ctx=canvas.getContext('2d');canvas.width=canvas.offsetWidth*2;canvas.height=320;
  const W=canvas.width,H=canvas.height,p={t:20,r:20,b:40,l:50},w=W-p.l-p.r,h=H-p.t-p.b;
  ctx.clearRect(0,0,W,H);
  const vals=pts.map(p=>p.v),mn=Math.min(...vals)-2,mx=Math.max(...vals)+2;
  const xS=pts.length>1?w/(pts.length-1):w;
  const toX=i=>p.l+i*xS,toY=v=>p.t+h-((v-mn)/(mx-mn))*h;
  ctx.strokeStyle='#1f1f1f';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=p.t+(h/4)*i;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+w,y);ctx.stroke();ctx.fillStyle='#444';ctx.font='18px sans-serif';ctx.textAlign='right';ctx.fillText((mx-(mx-mn)*(i/4)).toFixed(1),p.l-8,y+6);}
  if(pts.length>1){const g=ctx.createLinearGradient(0,p.t,0,p.t+h);g.addColorStop(0,color+'44');g.addColorStop(1,color+'00');ctx.beginPath();ctx.moveTo(toX(0),toY(vals[0]));vals.forEach((v,i)=>{if(i>0)ctx.lineTo(toX(i),toY(v));});ctx.lineTo(toX(vals.length-1),p.t+h);ctx.lineTo(toX(0),p.t+h);ctx.closePath();ctx.fillStyle=g;ctx.fill();ctx.beginPath();ctx.moveTo(toX(0),toY(vals[0]));vals.forEach((v,i)=>{if(i>0)ctx.lineTo(toX(i),toY(v));});ctx.strokeStyle=color;ctx.lineWidth=3;ctx.stroke();}
  vals.forEach((v,i)=>{ctx.beginPath();ctx.arc(toX(i),toY(v),5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();});
  ctx.fillStyle='#444';ctx.font='16px sans-serif';ctx.textAlign='center';
  pts.forEach((pt,i)=>{const parts=pt.l.split('-');ctx.fillText(`${parts[1]}/${parts[2]}`,toX(i),H-8);});
}

function drawBars(id,pts,color,target){
  const canvas=document.getElementById(id);if(!canvas||pts.length===0)return;
  const ctx=canvas.getContext('2d');canvas.width=canvas.offsetWidth*2;canvas.height=320;
  const W=canvas.width,H=canvas.height,p={t:20,r:20,b:40,l:50},w=W-p.l-p.r,h=H-p.t-p.b;
  ctx.clearRect(0,0,W,H);
  const vals=pts.map(p=>p.v),mx=Math.max(...vals,target)*1.1,bW=(w/pts.length)*0.6,bG=w/pts.length;
  const toY=v=>p.t+h-(v/mx)*h;
  ctx.strokeStyle='#1f1f1f';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=p.t+(h/4)*i;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+w,y);ctx.stroke();ctx.fillStyle='#444';ctx.font='18px sans-serif';ctx.textAlign='right';ctx.fillText(Math.round(mx-(mx/4)*i),p.l-8,y+6);}
  if(target){const ty=toY(target);ctx.setLineDash([8,6]);ctx.strokeStyle='#f59e0b88';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(p.l,ty);ctx.lineTo(p.l+w,ty);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#f59e0b';ctx.font='16px sans-serif';ctx.textAlign='left';ctx.fillText('TARGET',p.l+4,ty-6);}
  vals.forEach((v,i)=>{const x=p.l+i*bG+(bG-bW)/2,bH=(v/mx)*h;ctx.fillStyle=v>target?'#ef444488':color+'cc';ctx.beginPath();try{ctx.roundRect(x,toY(v),bW,bH,[3,3,0,0]);}catch{ctx.rect(x,toY(v),bW,bH);}ctx.fill();});
  ctx.fillStyle='#444';ctx.font='16px sans-serif';ctx.textAlign='center';
  pts.forEach((pt,i)=>{const x=p.l+i*bG+bG/2,parts=pt.l.split('-');ctx.fillText(`${parts[1]}/${parts[2]}`,x,H-8);});
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');clearInterval(ifInterval);
  if(name==='home')renderHome();
  else if(name==='workout')renderWorkout();
  else if(name==='log')renderLog();
  else if(name==='stats')renderStats();
}

renderHome();
</script>
